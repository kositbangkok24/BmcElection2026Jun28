        let currentDistrict = "dindang";
        let scenarioChart = null;
        let compChart = null;

        function init() {
            renderNav();
            renderContent();
        }

        function renderNav() {
            const nav = document.getElementById('districtNav');
            nav.innerHTML = '';
            for (const key in districtsData) {
                const btn = document.createElement('button');
                btn.className = `nav-item w-full flex items-center p-3 rounded-lg text-sm font-medium transition-all ${currentDistrict === key ? 'active shadow-md' : 'hover:bg-gray-100 text-gray-600'}`;
                btn.onclick = () => switchDistrict(key);
                btn.innerHTML = `
                    <span class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-200 text-slate-700 mr-3 font-bold text-xs">${districtsData[key].number}</span>
                    ${districtsData[key].name}
                `;
                nav.appendChild(btn);
            }
        }

        function switchDistrict(id) {
            currentDistrict = id;
            renderNav();
            renderContent();
        }

        function renderContent() {
            const data = districtsData[currentDistrict];
            const container = document.getElementById('contentContainer');
            
            container.innerHTML = `
                <div class="mb-8 animate-in fade-in duration-500">
                    <div class="district-header p-8 rounded-3xl mb-8 border border-gray-200 shadow-sm">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
                            <div>
                                <span class="bg-slate-800 text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-tighter">เขตยุทธศาสตร์</span>
                                <h2 class="text-4xl font-extrabold text-slate-800 mt-2">${data.name}</h2>
                            </div>
                            <div class="mt-4 md:mt-0 text-right">
                                <p class="text-sm text-slate-500">ผู้สมัครกลุ่มคนทำงาน</p>
                                <p class="text-2xl font-bold text-slate-800">${data.candidate} <span class="text-4xl ml-2 text-indigo-600">#${data.number}</span></p>
                            </div>
                        </div>
                        <p class="text-lg text-slate-600 italic border-l-4 border-indigo-500 pl-4 py-2 bg-white/50 rounded-r-lg">"${data.slogan}"</p>
                        <p class="mt-6 text-slate-700 leading-relaxed max-w-3xl">${data.background}</p>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                        <div class="glass-card p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 class="text-xl font-bold mb-6 flex items-center text-slate-800">
                                <span class="w-2 h-6 bg-indigo-500 mr-3 rounded-full"></span> วิเคราะห์ความน่าจะเป็นของฉากทัศน์
                            </h3>
                            <div class="chart-container">
                                <canvas id="scenarioChart"></canvas>
                            </div>
                            <p class="mt-6 text-sm text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-100">${data.scenarios.desc}</p>
                        </div>
                        
                        <div class="glass-card p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 class="text-xl font-bold mb-6 flex items-center text-slate-800">
                                <span class="w-2 h-6 bg-indigo-500 mr-3 rounded-full"></span> ศักยภาพเมื่อเทียบกับคู่แข่งหลัก
                            </h3>
                            <div class="chart-container">
                                <canvas id="compChart"></canvas>
                            </div>
                            <div class="mt-6 space-y-2">
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">คำอธิบาย</p>
                                <p class="text-sm text-slate-600">• ค่าบวก: จุดแข็งเชิงยุทธศาสตร์ | • ค่าลบ: ความเปราะบางเชิงโครงสร้าง</p>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="p-8 rounded-3xl bg-white border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                <div class="flex items-center mb-6">
                                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mr-4">
                                        <span class="text-xl">📡</span>
                                    </div>
                                    <h3 class="text-2xl font-bold text-slate-800">AIR WAR Strategy</h3>
                                </div>
                                <ul class="space-y-4">
                                    ${data.airWar.map(item => `
                                        <li class="flex items-start">
                                            <span class="text-blue-500 mr-3 mt-1">✓</span>
                                            <span class="text-slate-600 text-base leading-relaxed">${item}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                            
                            <div class="p-8 rounded-3xl bg-white border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                <div class="flex items-center mb-6">
                                    <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mr-4">
                                        <span class="text-xl">🥾</span>
                                    </div>
                                    <h3 class="text-2xl font-bold text-slate-800">GROUND WAR Strategy</h3>
                                </div>
                                <ul class="space-y-4">
                                    ${data.groundWar.map(item => `
                                        <li class="flex items-start">
                                            <span class="text-emerald-500 mr-3 mt-1">✓</span>
                                            <span class="text-slate-600 text-base leading-relaxed">${item}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        </div>

                        <div class="p-8 rounded-3xl bg-slate-800 text-white relative overflow-hidden">
                            <div class="relative z-10">
                                <h4 class="text-indigo-300 font-bold uppercase tracking-widest text-xs mb-2">Strategic Add-on / The X-Factor</h4>
                                <h3 class="text-3xl font-bold mb-4">${data.addon.title}</h3>
                                <p class="text-slate-300 text-lg leading-relaxed max-w-4xl">${data.addon.content}</p>
                            </div>
                            <div class="absolute right-0 bottom-0 opacity-10 transform translate-y-10 translate-x-10">
                                <span class="text-9xl font-black">${data.number}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            initCharts(data);
        }

        function initCharts(data) {
            if (scenarioChart) scenarioChart.destroy();
            if (compChart) compChart.destroy();

            const scenarioCtx = document.getElementById('scenarioChart').getContext('2d');
            scenarioChart = new Chart(scenarioCtx, {
                type: 'doughnut',
                data: {
                    labels: data.scenarios.labels,
                    datasets: [{
                        data: data.scenarios.data,
                        backgroundColor: ['#6366f1', '#475569', '#cbd5e1'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { family: 'Anuphan' } } }
                    },
                    cutout: '70%'
                }
            });

            const compCtx = document.getElementById('compChart').getContext('2d');
            compChart = new Chart(compCtx, {
                type: 'bar',
                data: {
                    labels: data.comparison.map(c => c.name),
                    datasets: [
                        {
                            label: 'จุดแข็งเชิงยุทธศาสตร์',
                            data: data.comparison.map(c => c.strength),
                            backgroundColor: 'rgba(99, 102, 241, 0.7)',
                            borderRadius: 8
                        },
                        {
                            label: 'ความเปราะบาง (ติดลบ)',
                            data: data.comparison.map(c => -c.vulnerability),
                            backgroundColor: 'rgba(203, 213, 225, 0.7)',
                            borderRadius: 8
                        }
                    ]
                },
                options: {
                    indexAxis: 'y',
                    maintainAspectRatio: false,
                    responsive: true,
                    scales: {
                        x: { stacked: false, grid: { display: false } },
                        y: { stacked: false, grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: true, position: 'bottom', labels: { font: { family: 'Anuphan' } } }
                    }
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
